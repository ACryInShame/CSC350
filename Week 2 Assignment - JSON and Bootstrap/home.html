<!DOCTYPE html>
<html lang="en">
<head>
    <title>Favorite Music</title>
    <!-- Bootstap calls -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- JS file for project -->
    <script src="JS\main.js" defer></script>
</head>
<body class="bg-primary d-flex d-md-flex justify-content-center align-items-center min-vh-100">
    
    <div class="container text-center bg-primary-subtle text-center">
        
        <div class="row align-items-stretch">

            <!-- Left Side Picture Cell -->
            <div class="col-sm-4 p-3 " id="PictureCell">
                <img id="SingerImage" class="w-100 rounded" src="IMG/Chuck.jpg" alt="The Greatest man of all time">
            </div>
            <!-- Right Side Table Cell -->
            <div class="col-sm-8 p-3 table-responsive h-100" id="TableCell">
                <table class="table table-dark table-hover" id="Table">
                    <thead>
                        <tr>
                            <td>Name</td>
                            <td>Best Song</td>
                            <td>Date of Birth</td>
                        </tr>
                    </thead>
                    <tbody id="TableBody">

                    </tbody>
                </table>
            </div>

        </div>
    
    </div>

</html>
