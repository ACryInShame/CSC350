<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 1 Assignment - Mapping</title>
    <link rel="stylesheet" href="CSS/Styles.css">
    <script src="JS/Main.js" defer></script>
</head>
<body>
    <div class="Header">
        What Countries would you like to visit?
    </div>
    <!-- container seperated into 3 sections using CSS -->
    <div class="Container">
        <!-- Top of Div -->
        <div class="Input">
            <!-- input bar and button for user input -->
            <input id="CountryInput" type="Country To Visit">
            <button id="AddButton">Add to List</button>
        </div>

        <!-- Center of Div -->
        <ol id="CountryList"></ol>

        <!-- Bottom of Div -->
        <button id="ClearButton">Clear List</button> <!-- Used to clear list on page -->
    </div>
</body>
